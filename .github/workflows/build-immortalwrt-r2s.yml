# ImmortalWrt CI action

name: Build ImmortalWrt for R2S

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Select ImmortalWrt branch'
        required: true
        default: 'openwrt-24.10'
        type: choice
        options:
          - openwrt-24.10
          - openwrt-23.05
          - master
      target:
        description: 'Target platform'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - aarch64_generic
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - arm_cortex-a7
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a8_vfpv3
          - arm_cortex-a9
          - arm_cortex-a9_vfpv3-d16
          - arm_cortex-a9_neon
          - arm_cortex-a15_neon-vfpv4
          - mipsel_24kc
          - mips_24kc
          - ramips_mt7620
          - ramips_mt7621
          - ramips_mt76x8
          - mediatek_mt7622
          - ipq40xx_generic
          - ipq806x_generic
      profile:
        description: 'Target profile (optional)'
        required: false
        type: string
        default: ''
      proxy_mode:
        description: 'Proxy plugin mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - lite

env:
  TZ: Asia/Shanghai
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: main

      - name: Show variables
        run: |
          echo "Branch: ${{ github.event.inputs.branch }}"
          echo "Target: ${{ github.event.inputs.target }}"
          echo "Profile: ${{ github.event.inputs.profile }}"
          echo "Proxy Mode: ${{ github.event.inputs.proxy_mode }}"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get clean
          sudo docker image prune -a -f
          df -h

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get update
          sudo -E apt-get -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5 \
            libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm lrzsz mkisofs msmtp \
            nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip python3-ply \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig \
            texinfo uglifyjs upx upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo timedatectl set-timezone "$TZ"

      - name: Clone source code
        working-directory: main
        run: |
          set -x
          git clone --single-branch --depth 1 -b ${{ github.event.inputs.branch }} https://github.com/immortalwrt/immortalwrt.git openwrt
          cd openwrt
          echo "COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')" >> $GITHUB_ENV
          echo "COMMIT_DATE=$(git log -1 --pretty=format:'%ci')" >> $GITHUB_ENV
          echo "COMMIT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
          echo "COMMIT_MSG=$(git log -1 --pretty=format:'%s')" >> $GITHUB_ENV

      - name: Load custom feeds
        run: |
          # Add SSRP feeds to feeds.conf.default
          echo 'src-git helloworld https://github.com/fw876/helloworld.git' >> openwrt/feeds.conf.default
          
          # Create custom feeds configuration
          cat > openwrt/feeds.conf.custom << 'EOF'
          src-git packages https://github.com/immortalwrt/packages.git;openwrt-24.10
          src-git luci https://github.com/immortalwrt/luci.git;openwrt-24.10
          src-git routing https://github.com/immortalwrt/routing.git;openwrt-24.10
          src-git telephony https://github.com/immortalwrt/telephony.git;openwrt-24.10
          src-git helloworld https://github.com/fw876/helloworld.git
          EOF
          
          # Replace branch name in feeds.conf.custom based on input
          sed -i "s|openwrt-24.10|${{ github.event.inputs.branch }}|g" openwrt/feeds.conf.custom

      - name: Update feeds & Install feeds
        working-directory: main/openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          # Copy custom configuration file
          cp main/configs/config.seed main/openwrt/.config
          
          # Modify configuration based on target
          sed -i "s|CONFIG_TARGET_x86_64=y|# CONFIG_TARGET_x86_64 is not set|g" main/openwrt/.config
          sed -i "s|# CONFIG_TARGET_${{ github.event.inputs.target }} is not set|CONFIG_TARGET_${{ github.event.inputs.target }}=y|g" main/openwrt/.config
          
          # NanoPi R2S specific configuration
          if [ "${{ github.event.inputs.target }}" = "aarch64_generic" ]; then
            echo ">> 应用 NanoPi R2S 专用配置..."
            
            # 设置 R2S 为目标设备
            sed -i 's|CONFIG_TARGET_PROFILE=""|CONFIG_TARGET_PROFILE="friendlyarm_nanopi-r2s"|g' main/openwrt/.config
            sed -i 's|CONFIG_TARGET_BOARD="x86"|CONFIG_TARGET_BOARD="rockchip"|g' main/openwrt/.config
            sed -i 's|CONFIG_TARGET_SUBTARGET="64"|CONFIG_TARGET_SUBTARGET="armv8"|g' main/openwrt/.config
            sed -i 's|CONFIG_TARGET_ARCH_PACKAGES="x86_64"|CONFIG_TARGET_ARCH_PACKAGES="aarch64_generic"|g' main/openwrt/.config
            sed -i 's|CONFIG_DEFAULT_TARGET_OPTIMIZATION="-Os -pipe"|CONFIG_DEFAULT_TARGET_OPTIMIZATION="-Os -pipe -mcpu=cortex-a53"|g' main/openwrt/.config
          fi
          
          # Enable SSRP packages
          cat >> main/openwrt/.config << 'EOF'
          
          # SSRP Configuration
          CONFIG_PACKAGE_luci-app-ssr-plus=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Chinese=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks_NONE_Client=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks_Libev_Client=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks_NONE_Server=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks_Libev_Server=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_ShadowsocksR_Libev_Client=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_ShadowsocksR_Libev_Server=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Simple_obfs=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Simple_obfs_server=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Hysteria=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Trojan=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_NaiveProxy=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Kcptun=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadow_TLS=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_SingBox=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_V2ray_Plugin=y
          CONFIG_PACKAGE_luci-i18n-ssr-plus-zh-cn=y
          EOF

      - name: Apply NanoPi R2S customizations
        run: |
          # 如果是 R2S 平台，应用自定义配置
          if [ "${{ github.event.inputs.target }}" = "aarch64_generic" ]; then
            echo ">> 应用 NanoPi R2S LAN/WAN 对调和 IP 修改..."
            chmod +x main/scripts/customize-r2s.sh
            bash main/scripts/customize-r2s.sh main/openwrt
          fi

      - name: Download package
        working-directory: main/openwrt
        run: |
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile firmware
        working-directory: main/openwrt
        run: |
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "compile_status=success" >> $GITHUB_ENV

      - name: Prepare artifacts
        if: env.compile_status == 'success' && !cancelled()
        run: |
          mkdir -p main/artifacts
          find main/openwrt/bin/targets/ -name "*.bin" -o -name "*.img.gz" -o -name "*.factory" -o -name "*.img" | xargs cp -f main/artifacts/
          find main/openwrt/bin/targets/ -name "*.manifest" | xargs cp -f main/artifacts/
          find main/openwrt/bin/packages/ -name "*.ipk" -path "*/helloworld/*" | xargs cp -f main/artifacts/ 2>/dev/null || true
          cp main/openwrt/.config main/artifacts/config.seed
          cp main/openwrt/build_dir/target-*/linux-*/linux-*/.config main/artifacts/kernel_config 2>/dev/null || true

      - name: Generate release info
        if: env.compile_status == 'success' && !cancelled()
        run: |
          cat > main/INFO.md << EOF
          ## ImmortalWrt 固件编译完成
          
          ### 编译信息
          - **源码分支**: ${{ github.event.inputs.branch }}
          - **目标平台**: ${{ github.event.inputs.target }}
          - **目标设备**: ${{ github.event.inputs.profile || 'Default' }}
          - **代理插件模式**: ${{ github.event.inputs.proxy_mode }}
          
          ### 提交信息
          - **作者**: ${{ env.COMMIT_AUTHOR }}
          - **日期**: ${{ env.COMMIT_DATE }}
          - **Hash**: ${{ env.COMMIT_HASH }}
          - **说明**: ${{ env.COMMIT_MSG }}
          
          ### 插件说明
          - 已集成 luci-app-ssr-plus 插件
          - 支持 Shadowsocks/ShadowsocksR/Xray/Trojan/Hysteria/NaiveProxy 等协议
          
          ### 注意事项
          - 固件名称带 `ext4` 字样的为 ext4 文件系统格式
          - 固件名称带 `squashfs` 字样的为 squashfs 文件系统格式
          - 带 `sysupgrade` 字样的固件用于升级已有固件
          - 带 `factory` 字样的固件用于从原厂固件刷入
          - x86/x64 设备请使用 `img` 或 `ext4`/`squashfs` 镜像文件
          EOF

      - name: Release firmware
        if: env.compile_status == 'success' && !cancelled()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: immortalwrt-${{ github.event.inputs.branch }}-${{ github.event.inputs.target }}-$(date +%Y%m%d%H%M)
          body_path: main/INFO.md
          files: main/artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 10
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
