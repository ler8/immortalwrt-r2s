# ImmortalWrt CI action for NanoPi R2S

name: Build ImmortalWrt for R2S

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Select ImmortalWrt branch'
        required: true
        default: 'openwrt-24.10'
        type: choice
        options:
          - openwrt-24.10
          - openwrt-23.05
          - master
  push:
    branches:
      - main

env:
  TZ: Asia/Shanghai
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: main

      - name: Show variables
        run: |
          BRANCH="${{ github.event.inputs.branch || 'openwrt-24.10' }}"
          TARGET="aarch64_generic"
          PROFILE="friendlyarm_nanopi-r2s"
          PROXY_MODE="full"
          echo "Branch: $BRANCH"
          echo "Target: $TARGET"
          echo "Profile: $PROFILE"
          echo "Proxy Mode: $PROXY_MODE"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "PROFILE=$PROFILE" >> $GITHUB_ENV
          echo "PROXY_MODE=$PROXY_MODE" >> $GITHUB_ENV
          echo "RELEASE_TAG=immortalwrt-${BRANCH}-${TARGET}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}" >> $GITHUB_ENV

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get clean
          sudo docker image prune -a -f
          df -h

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get update
          sudo -E apt-get -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5 \
            libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm lrzsz mkisofs msmtp \
            nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig \
            texinfo uglifyjs upx unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo timedatectl set-timezone "$TZ"

      - name: Clone source code
        run: |
          set -x
          git clone --single-branch --depth 1 -b $BRANCH https://github.com/immortalwrt/immortalwrt.git openwrt
          cd openwrt
          echo "COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')" >> $GITHUB_ENV
          echo "COMMIT_DATE=$(git log -1 --pretty=format:'%ci')" >> $GITHUB_ENV
          echo "COMMIT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
          echo "COMMIT_MSG=$(git log -1 --pretty=format:'%s')" >> $GITHUB_ENV

      - name: Load custom feeds
        working-directory: openwrt
        run: |
          # Add helloworld (ssr-plus) feeds to feeds.conf.default
          echo 'src-git helloworld https://github.com/fw876/helloworld.git' >> feeds.conf.default

      - name: Update feeds & Install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          # Copy custom configuration file
          cp main/configs/config.seed openwrt/.config

          echo ">> 应用 NanoPi R2S 专用配置..."

          # 强制切换到 NanoPi R2S 目标，避免 defconfig 回落到 x86_64
          sed -i '/^CONFIG_TARGET_/d' openwrt/.config
          cat >> openwrt/.config << 'EOF'
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r2s=y
          CONFIG_TARGET_BOARD="rockchip"
          CONFIG_TARGET_SUBTARGET="armv8"
          CONFIG_TARGET_PROFILE="friendlyarm_nanopi-r2s"
          CONFIG_TARGET_ARCH_PACKAGES="aarch64_generic"
          CONFIG_TARGET_ROOTFS_CPIOGZ=y
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=256
          CONFIG_TARGET_UBIFS_FREE_SPACE_FIXUP=y
          CONFIG_TARGET_UBIFS_JOURNAL_SIZE=""
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_DIR=""
          CONFIG_TARGET_ROOTFS_PARTSIZE=512
          EOF
          sed -i 's|CONFIG_DEFAULT_TARGET_OPTIMIZATION=".*"|CONFIG_DEFAULT_TARGET_OPTIMIZATION="-Os -pipe -mcpu=cortex-a53"|g' openwrt/.config

          # Enable SSRP packages
          sed -i '/^CONFIG_PACKAGE_luci-app-ssr-plus/d' openwrt/.config
          sed -i '/^CONFIG_PACKAGE_luci-i18n-ssr-plus-zh-cn/d' openwrt/.config
          {
            echo ""
            echo "CONFIG_PACKAGE_luci-app-ssr-plus=y"
            echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Chinese=y"
            echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks_Libev_Client=y"
            echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks_Libev_Server=y"
            echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_ShadowsocksR_Libev_Client=y"
            echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_ShadowsocksR_Libev_Server=y"
            echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Simple_obfs=y"
            echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y"
            echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Hysteria=y"
            echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Trojan=y"
            echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_NaiveProxy=y"
            echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Kcptun=y"
            echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadow_TLS=y"
            echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_SingBox=y"
            echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_V2ray_Plugin=y"
            echo "CONFIG_PACKAGE_luci-i18n-ssr-plus-zh-cn=y"
          } >> openwrt/.config

      - name: Normalize repository scripts
        run: |
          echo ">> 标准化仓库 shell 脚本行尾..."
          find main -type f -name "*.sh" -print0 | xargs -0 sed -i 's/\r$//'

      - name: Apply NanoPi R2S customizations
        run: |
          echo ">> 应用 NanoPi R2S LAN/WAN 对调和 IP 修改..."
          chmod +x main/scripts/customize-r2s.sh
          bash main/scripts/customize-r2s.sh openwrt

      - name: Resolve final configuration
        working-directory: openwrt
        run: |
          make defconfig

      - name: Validate R2S target and SSRP packages
        run: |
          grep -q '^CONFIG_TARGET_rockchip=y' openwrt/.config
          grep -q '^CONFIG_TARGET_rockchip_armv8=y' openwrt/.config
          grep -q '^CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r2s=y' openwrt/.config
          grep -q '^CONFIG_TARGET_BOARD="rockchip"' openwrt/.config
          grep -q '^CONFIG_TARGET_SUBTARGET="armv8"' openwrt/.config
          grep -q '^CONFIG_TARGET_PROFILE="friendlyarm_nanopi-r2s"' openwrt/.config
          grep -q '^CONFIG_TARGET_ARCH_PACKAGES="aarch64_generic"' openwrt/.config
          grep -q '^CONFIG_TARGET_ROOTFS_PARTSIZE=512$' openwrt/.config
          grep -q 'src-git helloworld https://github.com/fw876/helloworld.git' openwrt/feeds.conf.default
          grep -q '^CONFIG_PACKAGE_luci-app-ssr-plus=y' openwrt/.config
          grep -q '^CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y' openwrt/.config
          grep -q '^CONFIG_PACKAGE_luci-i18n-ssr-plus-zh-cn=y' openwrt/.config
          test -x openwrt/files/etc/uci-defaults/99-nanopi-r2s-custom
          grep -q "set network.lan.device='eth0'" openwrt/files/etc/uci-defaults/99-nanopi-r2s-custom
          grep -q "set network.wan.device='eth1'" openwrt/files/etc/uci-defaults/99-nanopi-r2s-custom
          ! grep -q '^CONFIG_TARGET_x86' openwrt/.config

      - name: Download package
        working-directory: openwrt
        run: |
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile firmware
        working-directory: openwrt
        run: |
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "compile_status=success" >> $GITHUB_ENV

      - name: Prepare artifacts
        if: env.compile_status == 'success' && !cancelled()
        run: |
          mkdir -p artifacts
          find openwrt/bin/targets/ \( -name "*.bin" -o -name "*.img.gz" -o -name "*.factory" -o -name "*.img" -o -name "*.manifest" \) -exec cp -f -t artifacts {} +
          cp openwrt/.config artifacts/config.seed

      - name: Generate release info
        if: env.compile_status == 'success' && !cancelled()
        run: |
          cat > INFO.md << EOF
          ## ImmortalWrt 固件编译完成

          ### 编译信息
          - **源码分支**: $BRANCH
          - **目标平台**: $TARGET
          - **目标设备**: ${PROFILE:-Default}
          - **代理插件模式**: $PROXY_MODE

          ### 提交信息
          - **作者**: ${{ env.COMMIT_AUTHOR }}
          - **日期**: ${{ env.COMMIT_DATE }}
          - **Hash**: ${{ env.COMMIT_HASH }}
          - **说明**: ${{ env.COMMIT_MSG }}

          ### 插件说明
          - 已集成 luci-app-ssr-plus 插件
          - 支持 Shadowsocks/ShadowsocksR/Xray/Trojan/Hysteria/NaiveProxy 等协议

          ### 注意事项
          - 固件名称带 ext4 字样的为 ext4 文件系统格式
          - 固件名称带 squashfs 字样的为 squashfs 文件系统格式
          - 带 sysupgrade 字样的固件用于升级已有固件
          - x86/x64 设备请使用 img 或 ext4/squashfs 镜像文件
          EOF

      - name: Release firmware
        if: env.compile_status == 'success' && !cancelled()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: INFO.md
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 10
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
